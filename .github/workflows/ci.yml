name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    code-quality-checks:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Validate CLAUDE.md
              run: npx claude-code-lint@latest

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run Prettier format check
              run: npm run format:check

            - name: Run ESLint
              run: npm run lint

            - name: Check Expo dependencies compatibility
              run: npx expo install --check
